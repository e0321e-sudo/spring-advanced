server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MYSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret:
    key: ThisIsSuperLongJwtSecretKeyForSpringAdvancedProjectBySujiDontStealIt1234567890abcdefghi
  access:
    expiration: 3600000
  refresh:
    expiration: 1209600000